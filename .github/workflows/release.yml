name: Release

on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:

permissions:
  contents: write

jobs:
  build-linux:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      
      - name: Build
        run: cargo build --release
      
      - name: Rename binary
        run: mv target/release/ntscan ntscan-linux-amd64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntscan-linux-amd64
          path: ntscan-linux-amd64

  build-windows:
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      
      - name: Build
        run: cargo build --release
      
      - name: Rename binary
        run: Rename-Item target/release/ntscan.exe ntscan-windows-amd64.exe
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntscan-windows-amd64
          path: ntscan-windows-amd64.exe

  build-macos:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        run: |
          rustup update stable
          rustup default stable
      
      - name: Build
        run: cargo build --release
      
      - name: Rename binary (Intel)
        run: mv target/release/ntscan ntscan-darwin-amd64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntscan-darwin-amd64
          path: ntscan-darwin-amd64

  build-macos-arm:
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
      
      - name: Setup Rust
        run: |
          rustup update stable
          rustup target add aarch64-apple-darwin
      
      - name: Build ARM64
        run: cargo build --release --target aarch64-apple-darwin
      
      - name: Rename binary
        run: mv target/aarch64-apple-darwin/release/ntscan ntscan-darwin-arm64
      
      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: ntscan-darwin-arm64
          path: ntscan-darwin-arm64

  release:
    needs: [build-linux, build-windows, build-macos, build-macos-arm]
    runs-on: ubuntu-latest
    if: always() && needs.build-linux.result == 'success'
    steps:
      - uses: actions/checkout@v4
      
      - name: Download all artifacts
        uses: actions/download-artifact@v4
        with:
          path: artifacts
          merge-multiple: true
      
      - name: List artifacts
        run: ls -la artifacts/
      
      - name: Make binaries executable
        run: chmod +x artifacts/ntscan-linux-* artifacts/ntscan-darwin-* || true
      
      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: |
            artifacts/ntscan-linux-amd64
            artifacts/ntscan-windows-amd64.exe
            artifacts/ntscan-darwin-amd64
            artifacts/ntscan-darwin-arm64
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
