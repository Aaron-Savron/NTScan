name: Security Scan

on:
  push:
    branches: [ main, master ]
  pull_request:
    branches: [ main, master ]
  schedule:
    # Run daily at 2 AM
    - cron: '0 2 * * *'

jobs:
  security-scan:
    name: ntscan Security Analysis
    runs-on: ubuntu-latest
    permissions:
      actions: read
      contents: read
      security-events: write

    steps:
    - name: Checkout code
      uses: actions/checkout@v4

    - name: Install Rust
      uses: dtolnay/rust-action@stable

    - name: Build ntscan
      run: |
        # Build from source
        cargo build --release
        cp target/release/ntscan ./ntscan

    - name: Run ntscan
      run: |
        ./ntscan --sarif . || true
        ls -la ntscan-results.sarif || echo "SARIF file not created (no issues found)"
        # '|| true' allows the workflow to continue and upload results
        # even if critical issues are found

    - name: Check SARIF file exists
      id: check_sarif
      run: |
        if [ -f ntscan-results.sarif ]; then
          echo "exists=true" >> $GITHUB_OUTPUT
          ls -lh ntscan-results.sarif
        else
          echo "exists=false" >> $GITHUB_OUTPUT
          echo "No SARIF file to upload"
        fi

    - name: Upload SARIF to GitHub
      if: steps.check_sarif.outputs.exists == 'true'
      uses: github/codeql-action/upload-sarif@v4
      with:
        sarif_file: ./ntscan-results.sarif
        category: ntscan

    - name: Check for critical issues
      run: |
        ./ntscan --quiet --severity critical . || exit 1
        # Fail the build if critical issues exist
